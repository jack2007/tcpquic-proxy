name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_COMPRESS: "1"

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64 (Ubuntu 20.04 / GLIBC 2.31)
            platform: linux
            runner: ubuntu-22.04
            build-dir: build-linux-x64
            artifact-name: tcpquic-proxy-linux-x64
            binary-name: raypx2
          - name: Windows x64 (MSVC / Win7 API)
            platform: windows
            runner: windows-2022
            build-dir: build-windows-x64
            artifact-name: tcpquic-proxy-windows-x64
            binary-name: raypx2.exe
          - name: macOS Universal (x86_64 + arm64)
            platform: macos
            runner: macos-15-intel
            build-dir: build-macos-universal
            artifact-name: tcpquic-proxy-macos-universal
            binary-name: raypx2

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ runner.os }}-${{ matrix.platform }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ matrix.platform }}-

      - name: Build Linux portable binary
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euxo pipefail
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            -e CCACHE_DIR=/work/.ccache \
            -e CCACHE_BASEDIR=/work \
            -e CCACHE_COMPRESS=1 \
            -e DEBIAN_FRONTEND=noninteractive \
            ubuntu:20.04 \
            bash -euxo pipefail -c '
              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential \
                ca-certificates \
                ccache \
                g++-10 \
                gcc-10 \
                git \
                make \
                ninja-build \
                perl \
                pkg-config \
                python3-pip
              python3 -m pip install --upgrade "cmake>=3.27,<4"
              ccache --zero-stats || true
              cmake -S . -B "${{ matrix.build-dir }}" -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_COMPILER=gcc-10 \
                -DCMAKE_CXX_COMPILER=g++-10 \
                -DCMAKE_C_COMPILER_LAUNCHER=ccache \
                -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++" \
                -DCMAKE_SHARED_LINKER_FLAGS="-static-libgcc -static-libstdc++"
              cmake --build "${{ matrix.build-dir }}" --target tcpquic-proxy --parallel "$(nproc)"
              ccache --show-stats || true
            '

      - name: Install Windows build tools
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          choco install ccache nasm ninja strawberryperl -y --no-progress
          "C:\ProgramData\chocolatey\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\Strawberry\perl\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Windows MSVC binary
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          function Invoke-Checked {
            param(
              [Parameter(Mandatory = $true)]
              [string] $Label,
              [Parameter(Mandatory = $true)]
              [scriptblock] $Command
            )
            & $Command
            if ($LASTEXITCODE -ne 0) {
              Write-Output "::error title=$Label failed::$Label exited with code $LASTEXITCODE"
              throw "$Label failed with exit code $LASTEXITCODE"
            }
          }

          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (!$vsPath) {
            throw "Visual Studio with MSVC x64 tools was not found"
          }
          Import-Module "$vsPath\Common7\Tools\Microsoft.VisualStudio.DevShell.dll"
          Enter-VsDevShell -VsInstallPath $vsPath -SkipAutomaticLocation -DevCmdArguments "-arch=x64 -host_arch=x64"
          ccache --zero-stats
          Invoke-Checked "CMake configure" {
            cmake -S . -B "${{ matrix.build-dir }}" -G Ninja `
              -DCMAKE_BUILD_TYPE=Release `
              -DCMAKE_POLICY_DEFAULT_CMP0091=NEW `
              -DCMAKE_C_COMPILER_LAUNCHER=ccache `
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache `
              -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
              -DCMAKE_C_FLAGS="/D_WIN32_WINNT=0x0601" `
              -DCMAKE_CXX_FLAGS="/D_WIN32_WINNT=0x0601" `
              -DBUILD_SHARED_LIBS=OFF `
              -DTCPQUIC_MSQUIC_SHARED=OFF `
              -DQUIC_BUILD_SHARED=OFF `
              -DQUIC_STATIC_LINK_CRT=ON `
              -DCARES_STATIC=ON `
              -DCARES_SHARED=OFF `
              -DCARES_MSVC_STATIC_RUNTIME=ON `
              -DZSTD_BUILD_STATIC=ON `
              -DZSTD_BUILD_SHARED=OFF
          }
          cmake -LAH -N "${{ matrix.build-dir }}" | Select-String -Pattern "^(BUILD_SHARED_LIBS|TCPQUIC_MSQUIC_SHARED|QUIC_BUILD_SHARED|CARES_STATIC|CARES_SHARED|ZSTD_BUILD_STATIC|ZSTD_BUILD_SHARED):"
          $buildLog = Join-Path $PWD "windows-build.log"
          cmd /c "cmake --build ""${{ matrix.build-dir }}"" --target tcpquic-proxy --parallel $env:NUMBER_OF_PROCESSORS --verbose > ""$buildLog"" 2>&1"
          $buildExit = $LASTEXITCODE
          Get-Content -LiteralPath $buildLog | Write-Host
          if ($buildExit -ne 0) {
            $lines = @(Get-Content -LiteralPath $buildLog)
            $interesting = @($lines | Where-Object {
              $_ -match "FAILED:|ninja:|error|Error|ERROR|fatal|Fatal|Can't|Cannot|No such|not found|Unknown|unsupported|failed|Failed"
            })
            if ($interesting.Count -eq 0) {
              $interesting = @($lines | Select-Object -Last 40)
            }
            $summary = @($interesting | Select-Object -Last 40 | ForEach-Object {
              if ($_.Length -gt 500) { $_.Substring(0, 500) + "..." } else { $_ }
            }) -join "%0A"
            Write-Output "::error title=CMake build tcpquic-proxy failed::$summary"
            throw "CMake build tcpquic-proxy failed with exit code $buildExit"
          }
          $producedExecutables = Get-ChildItem -Path "${{ matrix.build-dir }}" -Filter "*.exe" -File -Recurse |
            Sort-Object FullName
          Write-Host "Produced executables under ${{ matrix.build-dir }}:"
          $producedExecutables | ForEach-Object { Write-Host ("  {0} ({1} bytes)" -f $_.FullName, $_.Length) }
          $raypx2Matches = @($producedExecutables | Where-Object { $_.Name -ieq "raypx2.exe" })
          $legacyTargetMatches = @($producedExecutables | Where-Object { $_.Name -ieq "tcpquic-proxy.exe" })
          if ($raypx2Matches.Count -eq 1) {
            $raypx2 = $raypx2Matches[0].FullName
          } elseif ($raypx2Matches.Count -eq 0 -and $legacyTargetMatches.Count -eq 1) {
            $raypx2 = $legacyTargetMatches[0].FullName
            Write-Output "::notice title=Windows binary name::Using tcpquic-proxy.exe as the built target and staging it as raypx2.exe"
          } else {
            $exeList = ($producedExecutables | ForEach-Object { "$($_.FullName) ($($_.Length) bytes)" }) -join "; "
            if (!$exeList) { $exeList = "<none>" }
            Write-Output "::error title=Windows binary missing::Expected one raypx2.exe or one tcpquic-proxy.exe; found raypx2=$($raypx2Matches.Count), tcpquic-proxy=$($legacyTargetMatches.Count). Executables: $exeList"
            throw "Expected one raypx2.exe or one tcpquic-proxy.exe"
          }
          $size = (Get-Item -LiteralPath $raypx2).Length
          Write-Host "raypx2.exe size: $size bytes"
          Write-Output "::notice title=Windows binary size::raypx2.exe size: $size bytes"
          if ($size -lt 1048576) {
            Write-Output "::error title=Windows binary too small::raypx2.exe size: $size bytes; expected a statically linked production binary larger than 1 MiB"
            throw "raypx2.exe is unexpectedly small; expected a statically linked production binary larger than 1 MiB"
          }
          $dependents = dumpbin /DEPENDENTS $raypx2
          $dependents | Write-Host
          $forbiddenDlls = @(
            "msquic.dll",
            "libzstd.dll",
            "zstd.dll",
            "cares.dll",
            "c-ares.dll",
            "libcrypto-3-x64.dll",
            "libssl-3-x64.dll",
            "mimalloc.dll",
            "spdlog.dll"
          )
          foreach ($dll in $forbiddenDlls) {
            if ($dependents -match [regex]::Escape($dll)) {
              Write-Output "::error title=Windows dynamic third-party dependency::raypx2.exe depends on project third-party DLL $dll; expected static linkage"
              throw "raypx2.exe depends on project third-party DLL $dll; expected static linkage"
            }
          }
          ccache --show-stats

      - name: Install macOS build tools
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euxo pipefail
          brew update
          brew install ccache ninja

      - name: Configure macOS architecture builds
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euxo pipefail
          for arch in x86_64 arm64; do
            cmake -S . -B "${{ matrix.build-dir }}-${arch}" -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_C_COMPILER_LAUNCHER=ccache \
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
              -DCMAKE_OSX_ARCHITECTURES="${arch}" \
              -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0
          done

      - name: Build macOS universal binary
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euxo pipefail
          ccache --zero-stats || true
          for arch in x86_64 arm64; do
            cmake --build "${{ matrix.build-dir }}-${arch}" --target tcpquic-proxy --parallel "$(sysctl -n hw.logicalcpu)"
          done
          ccache --show-stats || true

      - name: Stage Linux artifact
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p "artifacts/${{ matrix.artifact-name }}"
          src="${{ matrix.build-dir }}/bin/Release/raypx2"
          test -x "$src"
          cp "$src" "artifacts/${{ matrix.artifact-name }}/${{ matrix.binary-name }}"
          chmod +x "artifacts/${{ matrix.artifact-name }}/${{ matrix.binary-name }}"
          if [ -x "${{ matrix.build-dir }}/bin/Release/openssl" ]; then
            cp "${{ matrix.build-dir }}/bin/Release/openssl" "artifacts/${{ matrix.artifact-name }}/openssl-linux-x64"
            chmod +x "artifacts/${{ matrix.artifact-name }}/openssl-linux-x64"
          fi
          ldd "artifacts/${{ matrix.artifact-name }}/${{ matrix.binary-name }}" || true

      - name: Stage Windows artifact
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $artifactDir = Join-Path "artifacts" "${{ matrix.artifact-name }}"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

          $producedExecutables = Get-ChildItem -Path "${{ matrix.build-dir }}" -Filter "*.exe" -File -Recurse |
            Sort-Object FullName
          Write-Host "Produced executables under ${{ matrix.build-dir }}:"
          $producedExecutables | ForEach-Object { Write-Host ("  {0} ({1} bytes)" -f $_.FullName, $_.Length) }

          $raypx2Matches = @($producedExecutables | Where-Object { $_.Name -ieq "raypx2.exe" })
          $legacyTargetMatches = @($producedExecutables | Where-Object { $_.Name -ieq "tcpquic-proxy.exe" })
          if ($raypx2Matches.Count -eq 1) {
            $source = $raypx2Matches[0].FullName
          } elseif ($raypx2Matches.Count -eq 0 -and $legacyTargetMatches.Count -eq 1) {
            $source = $legacyTargetMatches[0].FullName
            Write-Output "::notice title=Windows artifact name::Staging tcpquic-proxy.exe as raypx2.exe"
          } else {
            $exeList = ($producedExecutables | ForEach-Object { "$($_.FullName) ($($_.Length) bytes)" }) -join "; "
            if (!$exeList) { $exeList = "<none>" }
            Write-Output "::error title=Windows artifact missing::Expected one raypx2.exe or one tcpquic-proxy.exe; found raypx2=$($raypx2Matches.Count), tcpquic-proxy=$($legacyTargetMatches.Count). Executables: $exeList"
            throw "Expected one raypx2.exe or one tcpquic-proxy.exe"
          }
          $sourceSize = (Get-Item -LiteralPath $source).Length
          if ($sourceSize -lt 1048576) {
            Write-Output "::error title=Windows artifact too small::Refusing to upload unexpectedly small raypx2.exe ($sourceSize bytes)"
            throw "Refusing to upload unexpectedly small raypx2.exe ($sourceSize bytes)"
          }

          Copy-Item -LiteralPath $source -Destination (Join-Path $artifactDir "${{ matrix.binary-name }}") -Force

          $openssl = $producedExecutables |
            Where-Object { $_.Name -ieq "openssl.exe" } |
            Select-Object -First 1
          if ($openssl) {
            Copy-Item -LiteralPath $openssl.FullName -Destination (Join-Path $artifactDir "openssl-windows-x64.exe") -Force
          }

      - name: Stage macOS artifact
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p "artifacts/${{ matrix.artifact-name }}"
          src_x64="${{ matrix.build-dir }}-x86_64/bin/Release/raypx2"
          src_arm64="${{ matrix.build-dir }}-arm64/bin/Release/raypx2"
          test -x "$src_x64"
          test -x "$src_arm64"
          lipo -create "$src_x64" "$src_arm64" -output "artifacts/${{ matrix.artifact-name }}/${{ matrix.binary-name }}"
          chmod +x "artifacts/${{ matrix.artifact-name }}/${{ matrix.binary-name }}"
          openssl_x64="${{ matrix.build-dir }}-x86_64/bin/Release/openssl"
          openssl_arm64="${{ matrix.build-dir }}-arm64/bin/Release/openssl"
          if [ -x "$openssl_x64" ] && [ -x "$openssl_arm64" ]; then
            lipo -create "$openssl_x64" "$openssl_arm64" -output "artifacts/${{ matrix.artifact-name }}/openssl-macos-universal"
            chmod +x "artifacts/${{ matrix.artifact-name }}/openssl-macos-universal"
          fi
          lipo -info "artifacts/${{ matrix.artifact-name }}/${{ matrix.binary-name }}"
          otool -l "artifacts/${{ matrix.artifact-name }}/${{ matrix.binary-name }}" | grep -A3 LC_BUILD_VERSION || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: artifacts/${{ matrix.artifact-name }}/
          if-no-files-found: error
          retention-days: 14
